<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BioHealth</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/assets/css/historico.css" />
  </head>
  <body>
    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <!--footer-->
    <div id="footer-placeholder"></div>
  </body>

  <script>
    async function loadFragment(containerId, fragmentPath, errorMessage) {
      try {
        const resp = await fetch(fragmentPath);
        if (!resp.ok) throw new Error(`Erro ${resp.status}`);
        const html = await resp.text();
        document.getElementById(containerId).innerHTML = html;
      } catch (error) {
        console.error(errorMessage, error);
        document.getElementById(containerId).innerHTML =
          `<div class="alert alert-danger p-2 m-0">Falha ao carregar ${containerId.replace("-placeholder", "")}.</div>`;
      }
    }

    loadFragment(
      "navbar-placeholder",
      "/fragments/navbar.html",
      "Não foi possível carregar navbar:",
    );
    loadFragment(
      "footer-placeholder",
      "/fragments/footer.html",
      "Não foi possível carregar footer:",
    );
  </script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
</html>
